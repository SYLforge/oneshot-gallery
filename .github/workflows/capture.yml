name: Capture

# Re-captures per-entry media (og.png, poster derivatives, optional loop.webm)
# and opens a PR with the refreshed files. Captures are committed to git —
# Vercel never runs Playwright.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Entry slug to capture (leave blank for all entries)"
        required: false
        type: string
      loop:
        description: "Also record 5s WebM scroll loops (slower)"
        required: false
        type: boolean
        default: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate entries
        run: pnpm validate

      - name: Build
        run: pnpm build

      - name: Capture
        run: >
          pnpm capture
          ${{ inputs.slug && format('--slug {0}', inputs.slug) || '' }}
          ${{ inputs.loop && '--loop' || '' }}

      - name: Budget check
        run: pnpm check-budget

      - name: Open PR with refreshed media
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh captured media"
          title: "chore: refresh captured media"
          body: "Automated capture run (slug: `${{ inputs.slug || 'all' }}`, loop: `${{ inputs.loop }}`)."
          branch: chore/capture-refresh
          add-paths: public/media/**
